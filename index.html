<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Data Dealer — Resumo Executivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
:root{--neon:#a3e635;--neon-dim:rgba(163,230,53,.15);--neon-glow:rgba(163,230,53,.4);--dark:#0a0a0a;--card:#131313;--card-border:#1e1e1e;--text:#e0e0e0;--dim:#777;--red:#ef4444;--amber:#f59e0b;--blue:#3b82f6;--cyan:#22d3ee}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Space Grotesk',sans-serif;background:var(--dark);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.wrap{max-width:480px;margin:0 auto;padding:0 0 40px}
.header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);padding:14px 16px 0;border-bottom:1px solid var(--card-border)}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.logo{display:flex;align-items:center;gap:8px}
.logo-data{color:#fff;font-weight:700;font-size:15px;letter-spacing:-.5px}
.logo-dealer{color:var(--neon);font-weight:700;font-size:15px;letter-spacing:-.5px}
.logo sup{font-size:7px;color:var(--dim);vertical-align:super}
.header-date{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px;font-family:'JetBrains Mono',monospace}
.live-dot{width:7px;height:7px;background:var(--neon);border-radius:50%;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 var(--neon-glow)}50%{box-shadow:0 0 0 6px transparent}}
.header-sub{font-size:9px;color:var(--dim);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:10px}
.tabs{display:flex;gap:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:10px 14px;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;letter-spacing:.5px;white-space:nowrap;text-transform:uppercase}
.tab.active{color:var(--neon);border-bottom-color:var(--neon)}
.tab:hover{color:var(--text)}
.section{display:none;padding:16px}
.section.visible{display:block}
.section-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--dim);margin:18px 0 12px;font-weight:600;display:flex;align-items:center;gap:10px}
.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--card-border),transparent)}
.hl-card{background:var(--card);border:1px solid var(--card-border);border-radius:12px;padding:16px;margin-bottom:10px;text-align:center;position:relative;overflow:hidden}
.hl-card::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:60%;height:1px;background:linear-gradient(90deg,transparent,var(--neon-glow),transparent)}
.hl-card.warn{border-color:var(--amber)}.hl-card.warn::before{background:linear-gradient(90deg,transparent,rgba(245,158,11,.4),transparent)}
.hl-card.danger{border-color:var(--red)}.hl-card.danger::before{background:linear-gradient(90deg,transparent,rgba(239,68,68,.4),transparent)}
.hl-label{font-size:9px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px}
.hl-value{font-family:'JetBrains Mono',monospace;font-size:30px;font-weight:700;color:var(--neon)}
.hl-value .unit{font-size:16px;font-weight:500}
.hl-sub{font-size:11px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px 14px;margin-bottom:8px}
.card-title{font-size:11px;font-weight:600;margin-bottom:10px;color:var(--text)}
.metric-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.metric-row:last-child{border-bottom:none}
.metric-label{font-size:11px;color:var(--dim);display:flex;align-items:center;gap:6px}
.metric-label i{font-size:10px}
.metric-value{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600}
.mv-neon{color:var(--neon)}.mv-red{color:var(--red)}.mv-amber{color:var(--amber)}.mv-blue{color:var(--blue)}.mv-cyan{color:var(--cyan)}
.marca-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.marca-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px}
.marca-name{font-size:12px;font-weight:700;color:var(--neon);margin-bottom:8px;letter-spacing:1px}
.marca-row{display:flex;justify-content:space-between;font-size:10px;padding:3px 0}
.marca-row span:first-child{color:var(--dim)}
.marca-row span:last-child{font-family:'JetBrains Mono',monospace;color:var(--text);font-weight:500}
.top-model-card{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:14px;margin-bottom:10px}
.top-model-icon{font-size:22px;color:var(--amber)}
.top-model-info{flex:1}
.top-model-sub{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1.5px}
.top-model-name{font-size:16px;font-weight:700;color:var(--neon)}
.top-model-count{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:700;color:var(--text)}
.ageing-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
.ageing-item{background:var(--card);border:1px solid var(--card-border);border-radius:8px;padding:10px;text-align:center}
.ageing-item.total{grid-column:1/-1;border-color:var(--neon);background:rgba(163,230,53,.04)}
.ageing-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.ageing-val{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;color:var(--text)}
.lucro-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.lucro-card{background:var(--card);border:1px solid var(--card-border);border-radius:10px;padding:12px;text-align:center}
.lucro-mes{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-weight:600}
.lucro-val{font-family:'JetBrains Mono',monospace;font-size:15px;font-weight:700}
.lucro-pos{color:var(--neon)}.lucro-neg{color:var(--red)}
.lucro-detail{font-size:9px;color:var(--dim);margin-top:4px;font-family:'JetBrains Mono',monospace}
.prog-wrap{margin:8px 0}
.prog-label{display:flex;justify-content:space-between;font-size:10px;color:var(--dim);margin-bottom:4px}
.prog-bar{height:6px;background:var(--card-border);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--neon);border-radius:3px;transition:width .6s ease}
.divider{height:1px;background:var(--card-border);margin:14px 0}
.footer{text-align:center;padding:30px 16px 20px;font-size:9px;color:#333;letter-spacing:2px;text-transform:uppercase}
.footer a{text-decoration:none}
.qr-section{margin-top:20px;padding:20px;background:var(--card);border:1px solid var(--card-border);border-radius:12px;display:flex;flex-direction:column;align-items:center;gap:12px}
.qr-section .qr-title{font-size:10px;color:var(--dim);letter-spacing:2px;text-transform:uppercase}
.qr-section .qr-sub{font-size:11px;color:var(--text);letter-spacing:0;text-transform:none;font-weight:400;margin-top:-4px}
.qr-section svg{border-radius:8px;background:rgba(0,0,0,.5);padding:10px}
.qr-section .qr-url{font-family:'JetBrains Mono',monospace;font-size:9px;color:var(--neon);letter-spacing:0;text-transform:none;word-break:break-all}
</style>
</head>
